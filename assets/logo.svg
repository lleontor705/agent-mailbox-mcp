<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
  </defs>
  <rect width="120" height="120" rx="24" fill="url(#bg)"/>
  <!-- Mailbox body -->
  <rect x="25" y="40" width="70" height="45" rx="6" fill="none" stroke="url(#accent)" stroke-width="3"/>
  <!-- Mailbox flap -->
  <path d="M25 46 L60 68 L95 46" fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <!-- Agent dots -->
  <circle cx="38" cy="28" r="6" fill="#00d2ff" opacity="0.9"/>
  <circle cx="60" cy="22" r="6" fill="#7b2ff7" opacity="0.9"/>
  <circle cx="82" cy="28" r="6" fill="#00d2ff" opacity="0.9"/>
  <!-- Connection lines -->
  <line x1="43" y1="30" x2="55" y2="25" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <line x1="65" y1="25" x2="77" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- A2A arrow -->
  <path d="M38 34 L38 40" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
  <path d="M82 34 L82 40" stroke="#00d2ff" stroke-width="1.5" opacity="0.6"/>
  <!-- Signal waves -->
  <path d="M48 94 Q60 88 72 94" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.5"/>
  <path d="M44 99 Q60 91 76 99" fill="none" stroke="#7b2ff7" stroke-width="1.5" opacity="0.3"/>
</svg>
